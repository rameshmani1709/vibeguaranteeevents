<!DOCTYPE html>
<html>
<head>
<title>Vibe Guarantee Events Brochure</title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Title icon -->
<link rel="icon" href="/assets/pdf/Vibe-Guarantee-Events-Brochure.pdf">

<!-- Redirect iOS users (iPhone/iPad/iPod) straight to the PDF.
     iOS Safari's in-iframe PDF viewer only renders the first page,
     so we bypass the iframe entirely on those devices. -->
<script>
  (function () {
    var ua = navigator.userAgent || navigator.vendor || window.opera;
    // Covers iPhone, iPad, iPod, and iPadOS 13+ (which reports as Mac with touch)
    var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    if (isIOS) {
      window.location.replace('/assets/pdf/Vibe-Guarantee-Events-Brochure.pdf');
    }
  })();
</script>

<style type="text/css">
  /* CSS for responsive iframe */
/* ========================= */

/* outer wrapper: set max-width & max-height; max-height greater than padding-bottom % will be ineffective and height will = padding-bottom % of max-width */
#Iframe-Master-CC-and-Rs {
  max-width: 100%;
  max-height: 100%; 
  overflow: hidden;
}

/* inner wrapper: make responsive */
.responsive-wrapper {
  position: relative;
  height: 0;    /* gets height from padding-bottom */
  
  /* put following styles (necessary for overflow and scrolling handling on mobile devices) inline in .responsive-wrapper around iframe because not stable in CSS:
    -webkit-overflow-scrolling: touch; overflow: auto; */
  
}
 
.responsive-wrapper iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  
  margin: 0;
  padding: 0;
  border: none;
}

/* padding-bottom = h/w as % -- sets aspect ratio */
/* YouTube video aspect ratio */
.responsive-wrapper-wxh-572x612 {
  padding-bottom: 107%;
}

/* Fallback link shown if the iframe fails to load */
.pdf-fallback {
  text-align: center;
  padding: 20px;
  font-family: Arial, sans-serif;
}
.pdf-fallback a {
  display: inline-block;
  padding: 12px 24px;
  background: #0066cc;
  color: #fff;
  text-decoration: none;
  border-radius: 4px;
}

</style>
</head>

<body bgcolor="#FFFFFF" leftmargin="0" topmargin="0" marginwidth="0" marginheight="0">
<div id="Iframe-Master-CC-and-Rs" class="set-margin set-padding set-border set-box-shadow center-block-horiz">
  <div class="responsive-wrapper 
     responsive-wrapper-wxh-572x612"
     style="-webkit-overflow-scrolling: touch; overflow: auto;">

    <iframe src="/assets/pdf/Vibe-Guarantee-Events-Brochure.pdf">
      <div class="pdf-fallback">
        <p>Your browser cannot display the PDF inline.</p>
        <a href="/assets/pdf/Vibe-Guarantee-Events-Brochure.pdf">Open the Vibe Guarantee Events Brochure</a>
      </div>
    </iframe>
    
  </div>
</div>
</body>
</html>
